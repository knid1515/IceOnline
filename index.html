<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peach Shop - Smart POS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --peach-dark: #C66B4F; 
            --peach-main: #FF9E7D; 
            --peach-light: rgba(255, 235, 225, 0.9); 
            --text-dark: #333; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body { background-color: #fce4ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-wrapper { 
            width: 100%; max-width: 400px; height: 95vh; background-color: white; 
            background-image: url('https://png.pngtree.com/background/20210710/original/pngtree-delicious-natural-peach-juice-picture-image_1029446.jpg');
            background-size: cover; background-position: center; box-shadow: 0 0 20px rgba(0,0,0,0.2); 
            border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; position: relative; 
        }

        /* ปุ่ม Admin ลับ มุมขวาบน */
        .admin-trigger { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.3); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 20; }

        .view-section { display: none; flex-direction: column; height: 100%; flex: 1; overflow: hidden; }
        .view-section.active { display: flex; }
        
        /* Header */
        .header-bar { background-color: var(--peach-dark); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .header-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        
        /* Chat & Messages */
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background-color: var(--peach-light); display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message.bot { background: white; color: var(--text-dark); align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.user { background: var(--peach-main); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .basket-info { background: #fffde7; border: 1px dashed #fbc02d; padding: 10px; border-radius: 10px; margin-top: 5px; color: #5d4037; font-size: 0.85rem; }

        /* Buttons & Controls */
        .quick-replies { padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #eee; background: rgba(255,255,255,0.95); }
        .quick-reply-btn { background: white; color: var(--peach-dark); border: 1px solid var(--peach-dark); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
        .quick-reply-btn.action { background: #4CAF50; color: white; border-color: #4CAF50; }
        
        .chat-input-area { display: none; padding: 12px; border-top: 1px solid #eee; background: white;}
        .chat-input-area input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .chat-input-area button { background: var(--peach-main); color: white; border: none; padding: 0 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; font-weight: bold;}

        /* Receipt (POS Style) */
        #receipt-area { background: white; padding: 25px; font-family: 'Courier New', monospace; color: #000; border: 1px solid #ddd; margin: 15px; border-radius: 5px; }
        .receipt-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.9rem; }
        
        /* Dashboard */
        .dash-content { flex: 1; overflow-y: auto; padding: 15px; background: #f9f9f9; }
        .order-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; font-size: 0.85rem; border-left: 5px solid #ff9800; }

        /* ✅ แก้ไขปัญหาพิมพ์หน้าขาว */
        @media print {
            body * { visibility: hidden !important; }
            #receipt-area, #receipt-area * { visibility: visible !important; }
            #receipt-area { 
                position: absolute !important; left: 0 !important; top: 0 !important; 
                width: 100% !important; margin: 0 !important; border: none !important; 
            }
            .app-wrapper, body { background: none !important; }
            @page { margin: 0; }
        }

        #global-loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--peach-main); display: flex; justify-content: center; align-items: center; z-index: 1000; color: white; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="global-loading"><div class="spinner"></div><p>กำลังโหลด...</p></div>

    <div class="app-wrapper">
        <div class="admin-trigger" onclick="openLogin()">⚙️</div>

        <div id="role-view" class="view-section" style="background: rgba(255,255,255,0.2);">
            <h1 id="main-title" style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); margin-bottom: 30px; text-align: center; padding-top: 100px;">Peach Shop</h1>
            <div style="padding: 20px; text-align: center;">
                <button style="width:100%; max-width:250px; padding:18px; background:var(--peach-main); color:white; border:none; border-radius:15px; font-size:1.3rem; font-weight:bold; cursor:pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2);" onclick="openCustomer()">🥤 เริ่มสั่งซื้อ</button>
            </div>
        </div>

        <div id="login-view" class="view-section" style="background: var(--peach-light);">
            <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px;">
                <div style="background:white; padding:25px; border-radius:15px; width:100%; text-align:center;">
                    <h3>🔐 รหัสผ่านร้านค้า</h3>
                    <input type="password" id="admin-password" style="width:100%; padding:12px; margin:15px 0; border:1px solid #ddd; border-radius:8px; text-align:center;" placeholder="admin1234">
                    <button style="width:100%; padding:12px; background:var(--peach-dark); color:white; border:none; border-radius:8px; cursor:pointer;" onclick="checkPassword()">เข้าสู่ระบบ</button>
                    <button onclick="goHome()" style="background:none; border:none; margin-top:15px; color:gray; cursor:pointer;">ยกเลิก</button>
                </div>
            </div>
        </div>

        <div id="customer-view" class="view-section">
            <div class="header-bar">
                <div class="header-info">🍑 <span class="shop-name-span">Peach Shop</span></div>
                <button onclick="goHome()" style="background:none; border:none; color:white; cursor:pointer;">หน้าแรก</button>
            </div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="quick-replies" id="quick-replies"></div>
            <div class="chat-input-area" id="input-area">
                <input type="text" id="user-input" placeholder="พิมพ์ชื่อ-ที่อยู่จัดส่ง และเบอร์โทร..." onkeypress="if(event.key==='Enter') finishOrder()">
                <button onclick="finishOrder()">ส่ง</button>
            </div>
        </div>

        <div id="receipt-view" class="view-section" style="background: rgba(255,255,255,0.5);">
            <div class="header-bar"><span>📝 ใบเสร็จของคุณ</span></div>
            <div style="flex:1; overflow-y:auto;">
                <div id="receipt-area"></div>
                <div style="padding: 0 20px 20px 20px; display:flex; flex-direction:column; gap:10px;">
                    <button onclick="saveImage()" style="padding:14px; background:#2196F3; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">💾 บันทึกรูปใบเสร็จ</button>
                    <button onclick="window.print()" style="padding:14px; background:#4CAF50; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🖨️ พิมพ์ใบเสร็จ</button>
                    <button onclick="openCustomer()" style="padding:12px; background:white; color:#666; border:1px solid #ddd; border-radius:10px; cursor:pointer;">🛒 สั่งรายการใหม่</button>
                </div>
            </div>
        </div>

        <div id="admin-view" class="view-section">
            <div class="header-bar" style="background-color: #ff9800;">
                <div class="header-info">📊 จัดการหลังร้าน</div>
                <button onclick="goHome()" style="background:none; border:none; color:white; cursor:pointer;">ออก</button>
            </div>
            <div style="display:flex; background:#eee;">
                <button onclick="switchTab('orders')" id="tab-orders" style="flex:1; padding:10px; border:none; background:#ddd;">ออเดอร์</button>
                <button onclick="switchTab('menu-edit')" id="tab-menu-edit" style="flex:1; padding:10px; border:none;">จัดการเมนู</button>
                <button onclick="switchTab('settings')" id="tab-settings" style="flex:1; padding:10px; border:none;">ตั้งค่า</button>
            </div>
            <div id="tab-content-orders" class="dash-content"></div>
            <div id="tab-content-menu-edit" class="dash-content" style="display:none; background:white;">
                <div id="menu-list-admin" style="padding:10px;"></div>
                <div style="padding:15px; border-top:1px solid #eee;">
                    <input type="text" id="new-menu-name" placeholder="ชื่อเมนูใหม่" style="width:70%; padding:10px; border:1px solid #ddd;">
                    <button onclick="addNewMenu()" style="width:25%; padding:10px; background:var(--peach-dark); color:white; border:none;">เพิ่ม</button>
                    <button onclick="saveMenuToSheet()" style="width:100%; padding:15px; background:#4CAF50; color:white; border:none; margin-top:10px; font-weight:bold;">💾 บันทึกเมนู</button>
                </div>
            </div>
            <div id="tab-content-settings" class="dash-content" style="display:none; background:white; padding:20px;">
                <label>ชื่อร้าน:</label><input type="text" id="set-store-name" style="width:100%; padding:10px; margin:5px 0 15px 0; border:1px solid #ddd;">
                <label>เบอร์โทร:</label><input type="text" id="set-store-tel" style="width:100%; padding:10px; margin:5px 0 15px 0; border:1px solid #ddd;">
                <button onclick="saveStoreSettings()" style="width:100%; padding:15px; background:#4CAF50; color:white; border:none; border-radius:10px;">💾 บันทึกการตั้งค่า</button>
            </div>
        </div>
    </div>

    <script>
        // 🔴 นำ Web App URL ของคุณมาใส่ตรงนี้
        const API_URL = 'https://script.google.com/macros/s/AKfycbz-KCVYUSlkZYGmmhaIClEoIZ2AglxFuHvASDmruZCSpY0Ffz7OYACT72b8xSNsK055Bg/exec'; 

        let config = { menus: [], options: [], toppings: [], settings: {} };
        let cart=[], total=0, selectedToppings=[], tempDrink='', tempOption='', tempPrice=0, localMenus=[];

        window.onload = () => {
            fetch(API_URL + '?action=getConfig').then(res => res.json()).then(data => {
                config = data;
                updateUIConfigs();
                document.getElementById('global-loading').style.display = 'none';
                document.getElementById('role-view').classList.add('active');
            });
        };

        function updateUIConfigs() {
            const name = config.settings.StoreName || 'Peach Shop';
            document.getElementById('main-title').innerText = name;
            document.querySelectorAll('.shop-name-span').forEach(el => el.innerText = name);
            document.getElementById('set-store-name').value = name;
            document.getElementById('set-store-tel').value = config.settings.Tel || '';
            localMenus = [...config.menus];
        }

        function clearAllViews() { document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active')); }
        function goHome() { clearAllViews(); document.getElementById('role-view').classList.add('active'); }
        function openLogin() { clearAllViews(); document.getElementById('login-view').classList.add('active'); }
        function checkPassword() { if(document.getElementById('admin-password').value === 'admin1234') openAdmin(); else alert("รหัสผิด!"); }
        function openAdmin() { clearAllViews(); document.getElementById('admin-view').classList.add('active'); switchTab('orders'); }
        function openCustomer() { clearAllViews(); document.getElementById('customer-view').classList.add('active'); cart=[]; total=0; startChat(); }

        function startChat() {
            document.getElementById('chat-messages').innerHTML = ''; document.getElementById('input-area').style.display = 'none';
            botReply(`รับน้ำชง หรือ น้ำแข็งใสดีคะ?`, [
                { label: '🥤 น้ำชง/น้ำพีช', action: () => showMenu() },
                { label: '🍧 น้ำแข็งใส', action: () => { selectedToppings=[]; showToppings(); } }
            ]);
        }

        function showMenu() { botReply("เลือกเมนูค่ะ 👇", config.menus.map(d => ({ label: d, action: () => { tempDrink=d; showOptions(); } }))); }
        function showOptions() { botReply(`รับ ${tempDrink} แบบไหนคะ?`, config.options.map(o => ({ label: o.label, action: () => { tempOption=o.label; tempPrice=o.p; showSweetness(); } }))); }
        function showSweetness() { botReply(`ความหวานระดับไหนคะ?`, [{label:'100%',action:()=>add('100%')},{label:'50%',action:()=>add('50%')},{label:'0%',action:()=>add('0%')}]); }
        
        function showToppings() {
            let count = selectedToppings.length + 1;
            let btns = config.toppings.map(t => ({ label: t, action: () => { selectedToppings.push(t); if(selectedToppings.length < 5) showToppings(); else confirmIce(); } }));
            if(selectedToppings.length > 0) btns.push({ label: '✅ ยืนยัน', action: () => confirmIce() });
            botReply(`เลือกท็อปปิ้งอย่างที่ ${count} (ได้สูงสุด 5):\n${selectedToppings.join(', ') || '-'}`, btns);
        }

        function confirmIce() { 
            const item = { n: 'น้ำแข็งใส', o: `ท็อปปิ้ง: ${selectedToppings.join(', ')}`, s: '-', p: 20 };
            cart.push(item); total += 20; 
            botReply("เพิ่มลงตะกร้าแล้วค่ะ!", [], `<div class="basket-info">🛒 <b>รายการในตะกร้า:</b><br>${cart.map((i,idx)=>`${idx+1}. ${i.n} (${i.p}฿)`).join('<br>')}<br><b>รวม: ${total}฿</b></div>`);
            setTimeout(() => askMore(), 500);
        }

        function add(s) { 
            cart.push({n: tempDrink, o: tempOption, s: s, p: tempPrice}); total+=tempPrice;
            botReply("เพิ่มลงตะกร้าแล้วค่ะ!", [], `<div class="basket-info">🛒 <b>รายการในตะกร้า:</b><br>${cart.map((i,idx)=>`${idx+1}. ${i.n} (${i.p}฿)`).join('<br>')}<br><b>รวม: ${total}฿</b></div>`);
            setTimeout(() => askMore(), 500);
        }

        function askMore() {
            botReply("รับรายการอื่นเพิ่มไหมคะ?", [
                { label: '➕ สั่งเพิ่ม', action: () => startChat() },
                { label: '🛍️ ชำระเงิน ('+total+'฿)', action: () => { document.getElementById('quick-replies').innerHTML=''; document.getElementById('input-area').style.display='flex'; botReply("ขอชื่อ-ที่อยู่จัดส่งด้วยค่ะ 🛵"); }, isAction: true }
            ]);
        }

        function finishOrder() {
            let addr = document.getElementById('user-input').value.trim(); if(!addr) return;
            document.getElementById('global-loading').style.display='flex';
            let itemsText = cart.map(i => `${i.n} ${i.o} (${i.s})`).join(', ');
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveOrder', items: itemsText, total: total, address: addr }) })
            .then(res=>res.json()).then(data => { document.getElementById('global-loading').style.display='none'; renderReceipt(data.id, addr); });
        }

        function renderReceipt(id, addr) {
            clearAllViews(); document.getElementById('receipt-view').classList.add('active');
            const now = new Date();
            const dateStr = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            let itemsHtml = cart.map(i => `<div class="receipt-row"><span>${i.n}</span><span>${i.p}.00</span></div><div style="font-size:0.75rem; color:#666; padding-left:10px;">- ${i.o} ${i.s !== '-' ? `(หวาน ${i.s})` : ''}</div>`).join('');
            document.getElementById('receipt-area').innerHTML = `
                <div style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                    <h2 style="margin:0;">${config.settings.StoreName}</h2>
                    <p style="margin:5px 0;">เลขบิล: ${id}</p>
                    <p style="margin:5px 0;">${dateStr} ${timeStr}</p>
                </div>
                ${itemsHtml}
                <div style="border-top:1px dashed #000; margin-top:10px; padding-top:5px; font-weight:bold;">
                    <div class="receipt-row"><span>ยอดรวม</span><span>${total}.00</span></div>
                </div>
                <div style="margin-top:15px; font-size:0.8rem; border-top:1px dashed #000; padding-top:10px;">
                    <p><b>ส่งที่:</b> ${addr}</p><p style="text-align:center; margin-top:15px;">ขอบคุณที่อุดหนุนค่ะ 🍑</p>
                </div>`;
        }

        function saveImage() {
            html2canvas(document.getElementById('receipt-area'), { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
                let link = document.createElement('a'); link.download = 'bill-peachshop.png'; link.href = canvas.toDataURL(); link.click();
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.dash-content').forEach(el => el.style.display = 'none');
            document.getElementById('tab-content-' + tab).style.display = 'block';
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => btn.style.background = '#eee');
            document.getElementById('tab-' + tab).style.background = '#ddd';
            if(tab === 'orders') fetchOrders();
            if(tab === 'menu-edit') renderMenuAdmin();
        }

        function fetchOrders() {
            fetch(API_URL + '?action=getOrders').then(res=>res.json()).then(data => {
                const dash = document.getElementById('tab-content-orders');
                dash.innerHTML = data.length === 0 ? "<p style='text-align:center;'>ไม่มีออเดอร์</p>" : 
                data.map(o => `<div class="order-card" style="border-left-color: ${o.Status==='เสร็จแล้ว'?'#4CAF50':(o.Status==='กำลังดำเนินการ'?'#ff9800':'#f44336')}"><b>#${o.OrderID}</b> [${o.Status}]<br>${o.Items}<br>รวม: ${o.Total}฿<br>${o.Address}<div style="display:flex; gap:5px; margin-top:10px;">${o.Status!=='เสร็จแล้ว' ? `<button onclick="updateStatus('${o.OrderID}', 'กำลังดำเนินการ')" style="flex:1; background:#ff9800; color:white; border:none; padding:8px; border-radius:5px;">กำลังทำ</button><button onclick="updateStatus('${o.OrderID}', 'เสร็จแล้ว')" style="flex:1; background:#4CAF50; color:white; border:none; padding:8px; border-radius:5px;">เสร็จแล้ว</button>` : ''}</div></div>`).join('');
            });
        }
        function updateStatus(id, st) { fetch(`${API_URL}?action=updateStatus&id=${id}&status=${st}`).then(() => fetchOrders()); }
        function renderMenuAdmin() { document.getElementById('menu-list-admin').innerHTML = localMenus.map((m, idx) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;"><span>${m}</span><button onclick="localMenus.splice(${idx},1); renderMenuAdmin();" style="color:red; background:none; border:none;">🗑️</button></div>`).join(''); }
        function addNewMenu() { const n = document.getElementById('new-menu-name'); if(n.value) { localMenus.push(n.value); n.value=''; renderMenuAdmin(); } }
        function saveMenuToSheet() { fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'updateMenuItems', menus: localMenus }) }).then(() => alert("บันทึกเมนูแล้ว!")); }
        function saveStoreSettings() { fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveSettings', settings: { StoreName: document.getElementById('set-store-name').value, Tel: document.getElementById('set-store-tel').value } }) }).then(() => alert("บันทึกแล้ว!")); }

        function botReply(txt, btns = [], extraHtml = '') {
            let msgBox = document.getElementById('chat-messages');
            msgBox.innerHTML += `<div class="message bot">${txt}${extraHtml}</div>`;
            let qr = document.getElementById('quick-replies'); qr.innerHTML = '';
            btns.forEach(btn => {
                let b = document.createElement('button'); b.className = btn.isAction ? 'quick-reply-btn action' : 'quick-reply-btn';
                b.innerHTML = btn.label; b.onclick = btn.action; qr.appendChild(b);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        }
    </script>
</body>
</html>
